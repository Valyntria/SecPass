name: Build Portable Windows Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check compile
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Lint
        run: cargo clippy

      - name: Build Release Binary
        run: cargo build --release

      - name: Prepare portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/secpass.exe dist/SecPass-Windows-Portable.exe

      - name: Upload Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecPass-Windows-Portable
          path: dist/SecPass-Windows-Portable.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/SecPass-Windows-Portable.exe \
            --title "SecPass ${GITHUB_REF_NAME}" \
            --notes "Portable Windows release for SecPass ${GITHUB_REF_NAME}."
        env:
          GH_TOKEN: ${{ github.token }}

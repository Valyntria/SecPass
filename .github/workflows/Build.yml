name: Build Portable Windows Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Check compile
        run: cargo check

      - name: Run tests
        run: cargo test

      - name: Lint
        run: cargo clippy

      - name: Build Release Binary
        run: cargo build --release

      - name: Prepare portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/secpass.exe dist/SecPass-Windows-Portable.exe

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI installer
        run: cargo wix --nocapture

      - name: Copy MSI to dist
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path target/wix -Filter *.msi | Select-Object -First 1
          if (-not $msi) { throw "No MSI found in target/wix" }
          Copy-Item $msi.FullName dist/SecPass-Installer-${{ github.ref_name }}.msi

      - name: Upload Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SecPass-Windows-Build
          path: |
            dist/SecPass-Windows-Portable.exe
            dist/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/SecPass-Windows-Portable.exe \
            dist/*.msi \
            --title "SecPass ${GITHUB_REF_NAME}" \
            --notes "Portable Windows executable and MSI installer for SecPass ${GITHUB_REF_NAME}."
        env:
          GH_TOKEN: ${{ github.token }}
